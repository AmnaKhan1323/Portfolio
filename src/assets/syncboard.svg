  <rect x="604" y="232" width="160" height="72" rx="8" fill="#1e293b" filter="url(#shadow)" opacity="0.7"/>
  <rect x="604" y="232" width="160" height="4" rx="2" fill="#10b981"/>
  <text x="616" y="254" font-family="Arial, sans-serif" font-weight="500" font-size="12" fill="#94a3b8" text-decoration="line-through">PostgreSQL schema</text>
  <text x="616" y="270" font-family="Arial, sans-serif" font-size="10" fill="#475569">Prisma migrations</text>
  <text x="730" y="290" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">✓</text>


  <circle cx="685" cy="24" r="14" fill="#0f766e" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="680" y="29" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="white">JD</text>
  <circle cx="710" cy="24" r="14" fill="#9333ea" stroke="#a855f7" stroke-width="1.5"/>
  <text x="705" y="29" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="white">SK</text>

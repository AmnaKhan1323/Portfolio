  <rect x="544" y="464" width="90" height="24" rx="6" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.5"/>
  <text x="558" y="480" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5">🔄 Redis</text>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#915EFF"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Top Bar -->
  <rect x="0" y="0" width="800" height="52" fill="#1a1a2e" rx="12"/>
  <rect x="0" y="20" width="800" height="32" fill="#1a1a2e"/>

  <!-- App Title -->
  <circle cx="30" cy="26" r="8" fill="url(#accent)"/>
  <text x="48" y="31" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white">We Meet</text>

  <!-- Meeting Info -->
  <text x="160" y="31" font-family="Arial, sans-serif" font-size="13" fill="#aaa6c3">Team Standup • 00:14:32</text>

  <!-- Top-right icons -->
  <rect x="680" y="14" width="24" height="24" rx="4" fill="#333"/>
  <text x="686" y="31" font-family="Arial, sans-serif" font-size="14" fill="#aaa">⚙</text>
  <rect x="714" y="14" width="24" height="24" rx="4" fill="#333"/>
  <text x="720" y="31" font-family="Arial, sans-serif" font-size="14" fill="#aaa">👤</text>
  <rect x="748" y="14" width="24" height="24" rx="4" fill="#333"/>
  <text x="752" y="31" font-family="Arial, sans-serif" font-size="12" fill="#aaa">4</text>

  <!-- Video Grid - 2x2 -->
  <!-- Person 1 (large, top-left) -->
  <rect x="24" y="68" width="365" height="190" rx="12" fill="#2a2a3e" filter="url(#shadow)"/>
  <circle cx="206" cy="145" r="40" fill="#4a3f6b"/>
  <text x="206" y="152" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="white" text-anchor="middle">AK</text>
  <rect x="34" y="232" width="80" height="20" rx="4" fill="rgba(0,0,0,0.5)"/>
  <text x="42" y="246" font-family="Arial, sans-serif" font-size="11" fill="white">Amna Khan</text>
  <!-- Mic indicator -->
  <circle cx="370" cy="242" r="8" fill="url(#green)" filter="url(#glow)"/>

  <!-- Person 2 (top-right) -->
  <rect x="403" y="68" width="365" height="190" rx="12" fill="#2e2345" filter="url(#shadow)"/>
  <circle cx="585" cy="145" r="40" fill="#3b5998"/>
  <text x="585" y="152" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="white" text-anchor="middle">JD</text>
  <rect x="413" y="232" width="76" height="20" rx="4" fill="rgba(0,0,0,0.5)"/>
  <text x="421" y="246" font-family="Arial, sans-serif" font-size="11" fill="white">John Doe</text>
  <circle cx="749" cy="242" r="8" fill="url(#green)" filter="url(#glow)"/>

  <!-- Person 3 (bottom-left) -->
  <rect x="24" y="272" width="365" height="190" rx="12" fill="#1e2a3a" filter="url(#shadow)"/>
  <circle cx="206" cy="349" r="40" fill="#2d6a4f"/>
  <text x="206" y="356" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="white" text-anchor="middle">SK</text>
  <rect x="34" y="436" width="82" height="20" rx="4" fill="rgba(0,0,0,0.5)"/>
  <text x="42" y="450" font-family="Arial, sans-serif" font-size="11" fill="white">Sara Khan</text>
  <circle cx="370" cy="446" r="8" fill="#ef4444"/>

  <!-- Person 4 (bottom-right) -->
  <rect x="403" y="272" width="365" height="190" rx="12" fill="#2a1e3e" filter="url(#shadow)"/>
  <circle cx="585" cy="349" r="40" fill="#7c3aed"/>
  <text x="585" y="356" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="white" text-anchor="middle">RP</text>
  <rect x="413" y="436" width="84" height="20" rx="4" fill="rgba(0,0,0,0.5)"/>
  <text x="421" y="450" font-family="Arial, sans-serif" font-size="11" fill="white">Raj Patel</text>
  <circle cx="749" cy="446" r="8" fill="url(#green)" filter="url(#glow)"/>

  <!-- Bottom Control Bar -->
  <rect x="200" y="475" width="400" height="0" rx="0" fill="transparent"/>

  <!-- Speaking indicator ring on Person 1 -->
  <rect x="22" y="66" width="369" height="194" rx="12" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>

  <!-- Chat bubble hint -->
  <rect x="660" y="68" width="108" height="30" rx="8" fill="#915EFF" opacity="0.15"/>
  <text x="676" y="88" font-family="Arial, sans-serif" font-size="12" fill="#915EFF">💬 Chat (3)</text>

  <!-- WebRTC Badge -->
  <rect x="580" y="12" width="88" height="28" rx="14" fill="url(#accent)" opacity="0.9"/>
  <text x="597" y="30" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="white">⚡ WebRTC</text>

  <!-- Agora Badge -->
  <rect x="480" y="12" width="88" height="28" rx="14" fill="rgba(255,255,255,0.08)" stroke="#915EFF" stroke-width="1"/>
  <text x="494" y="30" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#c4b5fd">🎙 Agora</text>
</svg>
  <rect x="416" y="316" width="64" height="24" rx="12" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="426" y="332" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#d8b4fe">Next.js</text>

  <rect x="488" y="316" width="70" height="24" rx="12" fill="rgba(234,179,8,0.15)" stroke="#eab308" stroke-width="0.8"/>
  <text x="498" y="332" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#fde047">Python</text>

  <rect x="566" y="316" width="74" height="24" rx="12" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="576" y="332" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#93c5fd">FastAPI</text>

  <rect x="648" y="316" width="62" height="24" rx="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="0.8"/>
  <text x="658" y="332" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#34d399">AWS</text>

  <rect x="416" y="348" width="76" height="24" rx="12" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="0.8"/>
  <text x="424" y="364" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#fb923c">OpenAI</text>

  <rect x="500" y="348" width="78" height="24" rx="12" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="510" y="364" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#22d3ee">Pinecone</text>

  <rect x="586" y="348" width="90" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="0.8"/>
  <text x="594" y="364" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#a5b4fc">PostgreSQL</text>

  <!-- Architecture diagram mini -->
  <rect x="416" y="384" width="80" height="34" rx="6" fill="#2a1a4a" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="428" y="400" font-family="Arial, sans-serif" font-size="9" fill="#d8b4fe">Frontend</text>
  <text x="430" y="412" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa">Next.js</text>

  <text x="503" y="404" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed">⇄</text>

  <rect x="520" y="384" width="80" height="34" rx="6" fill="#1a2a4a" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="536" y="400" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd">API</text>
  <text x="530" y="412" font-family="Arial, sans-serif" font-size="8" fill="#60a5fa">FastAPI</text>

  <text x="607" y="404" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">⇄</text>

  <rect x="624" y="384" width="80" height="34" rx="6" fill="#1a3a2a" stroke="#10b981" stroke-width="0.5"/>
  <text x="644" y="400" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7">LLM</text>
  <text x="636" y="412" font-family="Arial, sans-serif" font-size="8" fill="#34d399">GPT-4</text>

  <!-- Connection lines to Vector DB -->
  <rect x="520" y="428" width="80" height="34" rx="6" fill="#2a1a3a" stroke="#a855f7" stroke-width="0.5"/>
  <text x="528" y="444" font-family="Arial, sans-serif" font-size="9" fill="#d8b4fe">Vector DB</text>
  <text x="530" y="456" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa">Pinecone</text>

  <rect x="624" y="428" width="80" height="34" rx="6" fill="#1a1a3a" stroke="#6366f1" stroke-width="0.5"/>
  <text x="640" y="444" font-family="Arial, sans-serif" font-size="9" fill="#a5b4fc">Store</text>
  <text x="634" y="456" font-family="Arial, sans-serif" font-size="8" fill="#818cf8">PostgreSQL</text>
</svg>
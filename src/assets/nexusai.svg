<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0118"/>
      <stop offset="50%" style="stop-color:#1a0a3e"/>
      <stop offset="100%" style="stop-color:#0d001a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Header Bar -->
  <rect x="0" y="0" width="800" height="48" fill="#110825" rx="12"/>
  <rect x="0" y="20" width="800" height="28" fill="#110825"/>
  <circle cx="24" cy="24" r="10" fill="url(#purple)" filter="url(#glow)"/>
  <text x="42" y="29" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="white">NexusAI</text>
  <text x="120" y="29" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa">Document Intelligence Platform</text>

  <!-- Status badges -->
  <rect x="600" y="12" width="80" height="24" rx="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1"/>
  <text x="616" y="28" font-family="Arial, sans-serif" font-size="11" fill="#34d399">● Online</text>
  <rect x="690" y="12" width="90" height="24" rx="12" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="1"/>
  <text x="700" y="28" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">⚡ GPT-4</text>

  <!-- Left Panel - Chat -->
  <rect x="20" y="62" width="360" height="420" rx="12" fill="#1a0e30" filter="url(#shadow)"/>
  <text x="36" y="88" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="white">💬 AI Chat</text>

  <!-- Chat Messages -->
  <rect x="36" y="102" width="260" height="52" rx="10" fill="rgba(124,58,237,0.1)" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="48" y="122" font-family="Arial, sans-serif" font-size="11" fill="#d8b4fe">User</text>
  <text x="48" y="140" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Summarize Q3 revenue trends</text>

  <rect x="76" y="166" width="290" height="72" rx="10" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="88" y="186" font-family="Arial, sans-serif" font-size="11" fill="#93c5fd">NexusAI</text>
  <text x="88" y="204" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Based on 47 documents analyzed:</text>
  <text x="88" y="220" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Q3 revenue grew 23% YoY, driven by...</text>

  <rect x="36" y="250" width="240" height="52" rx="10" fill="rgba(124,58,237,0.1)" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="48" y="270" font-family="Arial, sans-serif" font-size="11" fill="#d8b4fe">User</text>
  <text x="48" y="288" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Show source citations</text>

  <rect x="76" y="314" width="290" height="84" rx="10" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="88" y="334" font-family="Arial, sans-serif" font-size="11" fill="#93c5fd">NexusAI — 3 sources found</text>
  <rect x="88" y="344" width="200" height="18" rx="4" fill="rgba(16,185,129,0.15)"/>
  <text x="96" y="357" font-family="Arial, sans-serif" font-size="10" fill="#34d399">📄 Q3-Report.pdf — Page 12</text>
  <rect x="88" y="366" width="180" height="18" rx="4" fill="rgba(16,185,129,0.15)"/>
  <text x="96" y="379" font-family="Arial, sans-serif" font-size="10" fill="#34d399">📄 Finance-Summary.xlsx — Sheet 3</text>

  <!-- Input bar -->
  <rect x="36" y="440" width="328" height="32" rx="8" fill="#2a1a4a" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="48" y="460" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Ask anything about your docs...</text>
  <circle cx="348" cy="456" r="12" fill="url(#purple)"/>
  <text x="343" y="461" font-family="Arial, sans-serif" font-size="14" fill="white">→</text>

  <!-- Right Panel - RAG Pipeline -->
  <rect x="400" y="62" width="380" height="200" rx="12" fill="#1a0e30" filter="url(#shadow)"/>
  <text x="416" y="88" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="white">🔄 RAG Pipeline</text>


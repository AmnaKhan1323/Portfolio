  <rect x="416" y="100" width="90" height="40" rx="8" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="1"/>
  <text x="434" y="116" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#d8b4fe">Upload</text>
  <text x="432" y="130" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">PDF / DOCX</text>

  <text x="514" y="124" font-family="Arial, sans-serif" font-size="16" fill="#7c3aed">→</text>

  <rect x="530" y="100" width="90" height="40" rx="8" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
  <text x="545" y="116" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#93c5fd">Chunk</text>
  <text x="541" y="130" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa">Embeddings</text>

  <text x="628" y="124" font-family="Arial, sans-serif" font-size="16" fill="#3b82f6">→</text>

  <rect x="645" y="100" width="110" height="40" rx="8" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
  <text x="658" y="116" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#6ee7b7">Vector DB</text>
  <text x="660" y="130" font-family="Arial, sans-serif" font-size="9" fill="#34d399">Pinecone</text>

  <!-- Metrics row -->
  <rect x="416" y="155" width="100" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
  <text x="436" y="174" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="white">47</text>
  <text x="426" y="190" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">Docs Indexed</text>

  <rect x="530" y="155" width="100" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
  <text x="548" y="174" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="white">1.2k</text>
  <text x="543" y="190" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa">Chunks</text>

  <rect x="645" y="155" width="110" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
  <text x="670" y="174" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="white">94%</text>
  <text x="660" y="190" font-family="Arial, sans-serif" font-size="10" fill="#34d399">Accuracy</text>

  <!-- Bottom right - Architecture -->
  <rect x="400" y="278" width="380" height="204" rx="12" fill="#1a0e30" filter="url(#shadow)"/>
  <text x="416" y="304" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="white">🏗️ Architecture</text>

